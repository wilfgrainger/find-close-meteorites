<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Meteorite Hunter – catch falling meteorites in this addictive space game!">
  <meta name="theme-color" content="#0b0e2d">
  <title>Meteorite Hunter ☄️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      display: flex; justify-content: center; align-items: center;
      background: #07081a; font-family: system-ui, sans-serif;
    }
    @keyframes pulse {
      from { transform: scale(1); opacity: 0.9; }
      to   { transform: scale(1.06); opacity: 1; }
    }
    .shake { animation: shake 0.3s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%  { transform: translateX(-6px) rotate(-1deg); }
      75%  { transform: translateX(6px) rotate(1deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.jsx"></script>
</body>
</html>
